version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    image: mcr.microsoft.com/devcontainers/java:17
    volumes:
      - .:/workspace:cached
    #command: sleep infinity
    command: /bin/sh -c "while sleep 1000; do :; done"
    tty: true
    stdin_open: true
    environment:
      - DB_URL=jdbc:postgresql://db:5432/user_management_db?ssl=false
      - DB_USERNAME=developer
      - DB_PASSWORD=devjava2026
      - PORT=8181
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: devjava2026
      POSTGRES_DB: user_management_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer -d user_management_db"]
      interval: 5s
      timeout: 5s
      retries: 5