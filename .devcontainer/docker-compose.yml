version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/java:17
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
    depends_on:
      db:
        condition: service_healthy
    command: sleep infinity

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: devjava2026
      POSTGRES_DB: user_management_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer -d user_management_db"]
      interval: 5s
      retries: 5

volumes:
  postgres-data: