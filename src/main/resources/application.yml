spring:
  application:
    name: user_management

  datasource:
    url: ${DB_URL:jdbc:postgresql://172.28.183.147:5432/user_management_db?ssl=false}
    username: ${DB_USERNAME:developer}
    password: ${DB_PASSWORD:devjava2026}
    driver-class-name: org.postgresql.Driver  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    generate-ddl: true
    show-sql: true
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

server:
  port: ${PORT:8181}

logging:
  level:
    org:
      hibernate:
        SQL: debug
        orm:
          jdbc:
            bind: trace